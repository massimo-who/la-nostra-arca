<div class="container px-3 mt-5 josefin-slab">
    <div class="row">
        <div class="col-3 pb-3">
            <button class="btn btn-success" (click)="goBack()"><mat-icon class="material-icons-outlined">reply</mat-icon> Indietro</button>
        
        </div>
    </div>
    <div class="row justify-content-between">
        <ng-container *ngFor="let animal of animals.lista">

            <div class="col-3 mx-1 mb-4 animal-card" (click)="goToAnimal(animal)">
                <mat-card >
    <mat-card-header>
      <mat-card-title>{{animal.nome}}</mat-card-title>
      <mat-card-subtitle>{{animal.tipo}}</mat-card-subtitle>
    </mat-card-header>
    <img mat-card-image src="{{animal.img}}" alt="not found" class="responsive">
    <mat-card-content *ngIf="animal.note">
      <p>
        {{animal.note}}
      </p>
    </mat-card-content>
  </mat-card>
                <!-- <div class="card" >
                    <div class="row justify-content-center">
                        <img src="{{animal.img}}" alt="..." class="responsive">
                    </div>
                    <div class="card-body">
                        <p class="card-text">{{animal.nome}}</p>
                    </div>
                </div> -->
            </div>
        </ng-container>
    </div>
</div>
